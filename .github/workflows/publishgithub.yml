name: Unified Library Publishing (GitHub Releases & Manual Maven Bundle)

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # 0. Check & Lint
  check:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run Lint & Tests
        run: ./gradlew :printer:lintRelease :printer:allTests --no-daemon

  # 1. Setup & Version Extraction
  setup:
    name: Setup & Versioning
    needs: check
    runs-on: ubuntu-latest
    outputs:
      lib_version: ${{ steps.get_version.outputs.LIB_VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Get Version from properties
        id: get_version
        run: |
          VERSION=$(grep 'LIB_VERSION=' gradle.properties | cut -d'=' -f2 | tr -d '\r' | xargs)
          echo "LIB_VERSION=$VERSION" >> $GITHUB_OUTPUT

  # 2. Build Android AAR
  build-android:
    name: Build Android
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build AAR
        run: ./gradlew :printer:assembleRelease --no-daemon
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kmp_printer-aar
          path: printer/build/outputs/aar/printer-release.aar

  # 3. Build iOS XCFramework
  build-ios:
    name: Build iOS
    needs: setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build XCFramework
        run: ./gradlew :printer:assembleKmpPrinterXCFramework --no-daemon
      - name: Zip XCFramework
        run: |
          cd printer/build/XCFrameworks/release/
          zip -r ../../../KmpPrinter.xcframework.zip KmpPrinter.xcframework
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kmp_printer-xcframework
          path: KmpPrinter.xcframework.zip

  # 4. Build JVM JAR
  build-jvm:
    name: Build JVM
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build JVM Jar
        run: ./gradlew :printer:jvmJar --no-daemon
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: kmp_printer-jvm
          path: printer/build/libs/printer-jvm-*.jar

  # 6. Prepare Manual Maven Bundle (No Auto-Upload)
  prepare-maven-bundle:
    name: Prepare Maven Bundle
    needs: setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      
      - name: Generate Local Repo
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSWORD: ${{ secrets.GPG_PASSWORD }}
        run: |
          ./gradlew clean --no-daemon
          ./gradlew :printer:publishAllPublicationsToLocalRepoRepository --no-daemon --no-configuration-cache
      
      - name: Create Sonatype Bundle
        run: |
          BUNDLE_NAME="sonatype-bundle-${{ needs.setup.outputs.lib_version }}.zip"
          cd printer/build/repo
          zip -r -X "../../../$BUNDLE_NAME" .
          zip -d "../../../$BUNDLE_NAME" "__MACOSX*" "*.DS_Store*" || true
      
      - name: Archive Sonatype Bundle
        uses: actions/upload-artifact@v4
        with:
          name: sonatype-central-bundle
          path: sonatype-bundle-${{ needs.setup.outputs.lib_version }}.zip

  # 7. Create GitHub Release (The Main Integration Point)
  create-release:
    name: Create GitHub Release
    needs: [setup, build-android, build-ios, build-jvm, prepare-maven-bundle]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts
      - name: Auto-Tag and Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.setup.outputs.lib_version }}
          name: "v${{ needs.setup.outputs.lib_version }}"
          files: |
            release_artifacts/kmp_printer-aar/**/*
            release_artifacts/kmp_printer-xcframework/**/*
            release_artifacts/kmp_printer-jvm/**/*
            release_artifacts/sonatype-central-bundle/**/*
          body: |
            ## 🚀 KmpPrinter v${{ needs.setup.outputs.lib_version }}
            
            KmpPrinter: Professional Kotlin Multiplatform Thermal Printing Library for ESC/POS.

            ### 🌍 Integration (GitHub Maven / JitPack)
            To use this library in your project, add the JitPack repository:
            ```kotlin
            repositories {
                maven { url = uri("https://jitpack.io") }
            }
            ```
            Then add the dependency:
            ```kotlin
            dependencies {
                implementation("com.github.ringga-dev:Printer-ESC-POS:v${{ needs.setup.outputs.lib_version }}")
            }
            ```

            ### 📦 Manual Assets
            - **Android**: `printer-release.aar`
            - **iOS**: `KmpPrinter.xcframework.zip`
            - **Maven Bundle**: `sonatype-bundle-${{ needs.setup.outputs.lib_version }}.zip` (For manual Sonatype upload)
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          allowUpdates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
