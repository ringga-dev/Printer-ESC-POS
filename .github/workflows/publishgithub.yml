  # 6. Sonatype Central Channel: Automated Publishing
  publish-sonatype:
    name: Publish to Maven Central
    needs: setup
    runs-on: macos-latest # Required for iOS targets to be signed/published correctly
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Publish to Local Folder
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSWORD: ${{ secrets.GPG_PASSWORD }}
        run: ./gradlew :printer:publishAllPublicationsToLocalRepoRepository --no-daemon --no-configuration-cache
      
      - name: Create Sonatype Bundle
        run: |
          cd printer/build/repo
          zip -r ../../../sonatype-bundle.zip .
      
      - name: Upload to Sonatype Central Portal
        run: |
          curl --verbose \
            --request POST \
            --user "${{ secrets.MAVEN_USERNAME }}:${{ secrets.MAVEN_PASSWORD }}" \
            --form "bundle=@sonatype-bundle.zip" \
            https://central.sonatype.com/api/v1/publisher/deployments

  # 7. Final: Create GitHub Release (COMPLETELY AUTOMATIC)
  create-release:
    name: Create GitHub Release
    needs: [setup, build-android, build-ios, build-jvm, publish-sonatype]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts

      - name: Auto-Tag and Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.setup.outputs.lib_version }}
          name: "v${{ needs.setup.outputs.lib_version }}"
          files: |
            release_artifacts/kmp_printer-aar/*
            release_artifacts/kmp_printer-xcframework/*
            release_artifacts/kmp_printer-jvm/*
            release_artifacts/sonatype-central-bundle/*
          body: |
            ## 🚀 KmpPrinter v${{ needs.setup.outputs.lib_version }}
            
            KmpPrinter: Professional Kotlin Multiplatform Thermal Printing Library for ESC/POS. 
            Generated automatically from `master`.

            ### 🛠️ Integration (GitHub Maven)
            ```kotlin
            maven { url = uri("https://raw.githubusercontent.com/ringga-dev/Printer-ESC-POS/maven-repo") }
            ```
            
            ```kotlin
            implementation("io.github.ringga-dev:kmp_printer:${{ needs.setup.outputs.lib_version }}")
            ```

            ### 🌍 Integration (Maven Central)
            ```kotlin
            implementation("io.github.ringga-dev:kmp_printer:${{ needs.setup.outputs.lib_version }}")
            ```
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
          # Crucial: Allow creating/updating the tag if it matches the current setup
          allowUpdates: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
