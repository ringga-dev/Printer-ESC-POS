name: Unified Library Publishing (Maven & Releases)

on:
  push:
    branches:
      - master
    tags:
      - 'v*'  # Trigger on tags for official releases

jobs:
  # 1. Setup & Version Extraction
  setup:
    name: Setup & Versioning
    runs-on: ubuntu-latest
    outputs:
      lib_version: ${{ steps.get_version.outputs.LIB_VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Get Version from properties
        id: get_version
        run: |
          VERSION=$(grep 'LIB_VERSION=' gradle.properties | cut -d'=' -f2)
          echo "LIB_VERSION=$VERSION" >> $GITHUB_OUTPUT

  # 2. Build Android AAR (Always runs)
  build-android:
    name: Build Android
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build AAR
        run: ./gradlew :printer:assembleRelease --no-daemon
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nggaprinter-aar
          path: printer/build/outputs/aar/printer-release.aar

  # 3. Build iOS XCFramework (Always runs)
  build-ios:
    name: Build iOS
    needs: setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build XCFramework
        run: ./gradlew :printer:assembleNggaPrinterXCFramework --no-daemon
      - name: Zip XCFramework
        run: |
          cd printer/build/XCFrameworks/release/
          zip -r ../../../NggaPrinter.xcframework.zip NggaPrinter.xcframework
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nggaprinter-xcframework
          path: NggaPrinter.xcframework.zip

  # 4. Independent Publishing: GitHub Maven Repo
  publish-github-maven:
    name: Publish to GitHub Repo
    needs: setup
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Publish to Local Folder
        run: ./gradlew :printer:publishAllPublicationsToLocalRepoRepository --no-daemon
      - name: Deploy to maven-repo branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/repo
          publish_branch: maven-repo
          force_orphan: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "Publish version ${{ needs.setup.outputs.lib_version }}"

  # 5. Independent Publishing: Maven Central (Sonatype)
  # This uses "continue-on-error" so a Sonatype failure doesn't stop the GitHub release
  publish-sonatype:
    name: Publish to Maven Central
    needs: setup
    runs-on: macos-latest
    continue-on-error: true 
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Publish to Remote
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSWORD }}
        run: ./gradlew :printer:publish --no-daemon

  # 6. Final Job: Create GitHub Release (Collects binaries)
  # Only triggers on Tags
  create-release:
    name: Create GitHub Release
    needs: [setup, build-android, build-ios]
    if: startsWith(github.ref, 'refs/tags/v') && needs.setup.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download Android Artifact
        uses: actions/download-artifact@v4
        with:
          name: nggaprinter-aar
          path: release_artifacts
        continue-on-error: true

      - name: Download iOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: nggaprinter-xcframework
          path: release_artifacts
        continue-on-error: true

      - name: Create Release Page
        uses: softprops/action-gh-release@v2
        with:
          files: release_artifacts/*
          name: Release ${{ needs.setup.outputs.lib_version }}
          body: |
            ## 📦 Release v${{ needs.setup.outputs.lib_version }}
            
            This release includes compiled binaries for manual integration.
            
            - **Android AAR**: For native Android projects.
            - **iOS XCFramework**: For native iOS/Swift projects.
            
            ### Integration (GitHub Maven)
            Add this to your `settings.gradle.kts`:
            ```kotlin
            maven { url = uri("https://raw.githubusercontent.com/ringga-dev/Printer-ESC-POS/maven-repo") }
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
