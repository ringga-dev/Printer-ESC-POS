name: Unified Library Publishing (Maven & Releases)

on:
  push:
    branches:
      - master
    tags:
      - 'v*'  # Trigger on tags for official releases

permissions:
  contents: write

jobs:
  # 1. Setup & Version Extraction
  setup:
    name: Setup & Versioning
    runs-on: ubuntu-latest
    outputs:
      lib_version: ${{ steps.get_version.outputs.LIB_VERSION }}
    steps:
      - uses: actions/checkout@v4
      - name: Get Version from properties
        id: get_version
        run: |
          VERSION=$(grep 'LIB_VERSION=' gradle.properties | cut -d'=' -f2)
          echo "LIB_VERSION=$VERSION" >> $GITHUB_OUTPUT

  # 2. Build Android AAR
  build-android:
    name: Build Android
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build AAR
        run: ./gradlew :printer:assembleRelease --no-daemon
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nggaprinter-aar
          path: printer/build/outputs/aar/printer-release.aar

  # 3. Build iOS XCFramework
  build-ios:
    name: Build iOS
    needs: setup
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build XCFramework
        run: ./gradlew :printer:assembleNggaPrinterXCFramework --no-daemon
      - name: Zip XCFramework
        run: |
          cd printer/build/XCFrameworks/release/
          zip -r ../../../NggaPrinter.xcframework.zip NggaPrinter.xcframework
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nggaprinter-xcframework
          path: NggaPrinter.xcframework.zip

  # 4. Build JVM JAR (Desktop)
  build-jvm:
    name: Build JVM
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build JVM Jar
        run: ./gradlew :printer:jvmJar --no-daemon
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nggaprinter-jvm
          path: printer/build/libs/printer-jvm-*.jar

  # 5. GitHub Channel: Maven Repo Branch
  publish-github-maven:
    name: Publish to GitHub Repo
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Publish to Local Folder
        run: ./gradlew :printer:publishAllPublicationsToLocalRepoRepository --no-daemon
      - name: Deploy to maven-repo branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/repo
          publish_branch: maven-repo
          force_orphan: false
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: "Publish version ${{ needs.setup.outputs.lib_version }}"

  # 6. Sonatype Central Channel: Bundle Preparation
  publish-sonatype-bundle:
    name: Create Sonatype Bundle
    needs: setup
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Local Deployment
        env:
          ORG_GRADLE_PROJECT_signingKey: ${{ secrets.GPG_SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingPassword: ${{ secrets.GPG_PASSWORD }}
        run: ./gradlew :printer:publishAllPublicationsToLocalRepoRepository --no-daemon
      - name: Create Bundle ZIP
        run: |
          cd build/repo
          zip -r ../../SonatypeCentralBundle.zip .
      - name: Upload Bundle
        uses: actions/upload-artifact@v4
        with:
          name: sonatype-central-bundle
          path: SonatypeCentralBundle.zip

  # 7. Final: Create GitHub Release (AUTO-RELEASE)
  create-release:
    name: Create GitHub Release
    needs: [setup, build-android, build-ios, build-jvm, publish-sonatype-bundle]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release_artifacts

      - name: Create / Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.setup.outputs.lib_version }}
          name: "Release v${{ needs.setup.outputs.lib_version }}"
          files: |
            release_artifacts/nggaprinter-aar/*
            release_artifacts/nggaprinter-xcframework/*
            release_artifacts/nggaprinter-jvm/*
            release_artifacts/sonatype-central-bundle/*
          body: |
            ## 🚀 NggaPrinter v${{ needs.setup.outputs.lib_version }}
            
            Professional Kotlin Multiplatform Thermal Printing Library. 
            This release is automatically generated and includes all compiled binaries.

            ### 📦 Compiled Assets
            - **Android**: Native AAR for Android Studio
            - **iOS**: XCFramework for Xcode / SPM
            - **JVM**: JAR for Desktop / Server
            - **Sonatype Central**: Bundle for Maven Central publication

            ### 🛠️ Integration (GitHub Maven)
            Add to your `settings.gradle.kts`:
            ```kotlin
            dependencyResolutionManagement {
                repositories {
                    maven { url = uri("https://raw.githubusercontent.com/ringga-dev/Printer-ESC-POS/maven-repo") }
                }
            }
            ```

            Then in your module:
            ```kotlin
            implementation("io.github.ringga-dev:nggaprinter:v${{ needs.setup.outputs.lib_version }}")
            ```

            ### 📖 Documentation
            Check the updated [INSTALLATION.md](https://github.com/ringga-dev/Printer-ESC-POS/blob/master/INSTALLATION.md) for full guide.
          draft: false
          prerelease: false
          make_latest: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
